apiVersion: apps/v1
kind: Deployment
metadata:
  name: maven-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maven-app
  template:
    metadata:
      labels:
        app: maven-app
    spec:
      containers:
      - name: maven-app
        image: maven-app:latest
        imagePullPolicy: Never